<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einheiten-Umrechner für Kids</title>
    <!-- Prevent client-side caching where possible -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>📏 Einheiten-Profi 📐</h1>
            <div id="user-info-header"></div>
        </header>
        
        <section id="start-menu" class="card">
            <h2>Was möchtest du lernen?</h2>
            <div class="topics-grid">
                <button id="btn-groessen" class="btn topic-card">Grössen</button>
                <button id="btn-deutsch" class="btn topic-card">Deutsch</button>
            </div>
        </section>

        <section id="settings" class="card hidden">
            <h2>Einstellungen</h2>
            <div class="control-group">
                <label for="mode">Was möchtest du üben?</label>
                <select id="mode">
                    <option value="distance">Längen (mm, cm, dm, m, km)</option>
                    <option value="area">Flächen (mm², cm², dm², m²)</option>
                    <option value="volume">Volumen (mm³, cm³, dm³, m³)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="difficulty">Schwierigkeit:</label>
                <select id="difficulty">
                    <option value="easy">Leicht (Ganze Zahlen, Nachbareinheiten)</option>
                    <option value="medium">Mittel (Einfache Kommazahlen)</option>
                    <option value="hard">Schwer (Knifflige Kommazahlen)</option>
                </select>
            </div>
            <div class="control-group button-row">
                <button id="start-btn" class="btn primary">Los geht's!</button>
                <button id="settings-back" class="btn small">Zurück</button>
            </div>
        </section>

        <section id="game-area" class="card hidden">
            <div class="score-board">
                <span>Punkte: <span id="score">0</span></span>
                <button id="back-btn" class="btn small">Zurück</button>
            </div>
            
            <div class="problem-container">
                <div class="problem">
                    <span id="value-display">100</span>
                    <span id="unit-from">cm</span>
                    <span>=</span>
                    <input type="number" id="user-input" step="any" placeholder="?">
                    <span id="unit-to">m</span>
                </div>
                <button id="check-btn" class="btn action">Prüfen</button>
            </div>

            <div id="feedback" class="feedback hidden"></div>
            <button id="next-btn" class="btn secondary hidden">Nächste Aufgabe</button>
        </section>

        <section id="deutsch" class="card hidden">
            <h2>Deutsch — Einstieg</h2>
            <p>Wähle aus, was du üben möchtest und starte die Übung.</p>
            <div class="control-group">
                <label for="deutsch-mode">Was möchtest du üben?</label>
                <select id="deutsch-mode">
                    <option value="grammar">Grammatik</option>
                    <option value="reading">Lesen</option>
                    <option value="writing">Schreiben</option>
                </select>
            </div>
            <div class="control-group">
                <label for="deutsch-difficulty">Schwierigkeit:</label>
                <select id="deutsch-difficulty">
                    <option value="easy">Einfach</option>
                    <option value="medium">Mittel</option>
                    <option value="hard">Schwer</option>
                </select>
            </div>
            <div class="control-group">
                <button id="deutsch-start" class="btn primary">Los geht's!</button>
            </div>
            <div class="control-group">
                <button id="deutsch-back" class="btn small">Zurück</button>
            </div>
        </section>

        <section id="login" class="card hidden">
            <div id="login-content"></div>
        </section>

        <section id="stats" class="card hidden">
            <div id="stats-content"></div>
        </section>

        <section id="deutsch-area" class="card hidden">
            <div class="score-board">
                <span>Punkte: <span id="deutsch-score">0</span></span>
                <button id="deutsch-exit" class="btn small">Zurück</button>
            </div>
            <div id="deutsch-content">
                <h3 id="deutsch-title">Deutsch — Übung</h3>
                <p id="deutsch-placeholder">Hier erscheinen später die Aufgaben (z. B. Grammatik-, Lese- oder Schreibaufgaben).</p>
            </div>
        </section>
    </div>
    <!-- Cache-busting and ESM entry point -->
    <script>
        (async function(){
            try {
                // Development helper: clear all CacheStorage entries and unregister service workers
                try {
                    if ('caches' in window) {
                        const keys = await caches.keys();
                        await Promise.all(keys.map(k => caches.delete(k)));
                        console.log('Cleared CacheStorage keys:', keys);
                    }
                } catch (cErr) {
                    console.warn('Failed to clear CacheStorage', cErr);
                }
                try {
                    if (navigator && navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        await Promise.all(regs.map(r => r.unregister()));
                        console.log('Unregistered service workers:', regs.length);
                    }
                } catch (swErr) {
                    console.warn('Failed to unregister service workers', swErr);
                }

                const v = Date.now();
                // update CSS link with cache-busting
                const css = document.querySelector('link[rel=stylesheet][href="style.css"]');
                if (css) css.href = 'style.css?v=' + v;
            } catch (e) {
                console.error('cache-busting error', e);
            }
        })();
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
