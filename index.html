<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Übungen</title>
    <!-- Prevent client-side caching where possible -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-bar">
                <div id="user-greeting-slot"></div>
                <div class="header-actions" id="header-actions">
                    <button id="header-back-btn" class="btn small hidden">Zurück</button>
                    <button id="header-stats-btn" class="btn small hidden">Statistik</button>
                    <button id="header-logout-btn" class="btn small hidden">Abmelden</button>
                    <button id="header-login-btn" class="btn small hidden">Anmelden</button>
                </div>
            </div>
        </header>
        
        <section id="start-menu" class="card">
            <div class="topics-grid">
                <button id="btn-groessen" class="btn topic-card">Grössen</button>
                <button id="btn-deutsch" class="btn topic-card">Deutsch</button>
            </div>
        </section>

        <section id="settings" class="card hidden">
            <h2>Einstellungen</h2>
            <div class="control-group">
                <label for="mode">Übung</label>
                <select id="mode">
                    <option value="distance">Längen (mm, cm, dm, m, km)</option>
                    <option value="area">Flächen (mm², cm², dm², m²)</option>
                    <option value="volume">Volumen (mm³, cm³, dm³, m³)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="difficulty">Schwierigkeit:</label>
                <select id="difficulty">
                    <option value="easy">Leicht (Ganze Zahlen, Nachbareinheiten)</option>
                    <option value="medium">Mittel (Einfache Kommazahlen)</option>
                    <option value="hard">Schwer (Knifflige Kommazahlen)</option>
                </select>
            </div>
            <div class="control-group button-row">
                <button id="start-btn" class="btn primary">Los geht's!</button>
            </div>
        </section>

        <section id="game-area" class="card hidden">
            <div class="score-board">
                <span>Punkte: <span id="score">0</span></span>
            </div>
            
            <div class="problem-container">
                <div class="problem">
                    <span id="value-display">100</span>
                    <span id="unit-from">cm</span>
                    <span>=</span>
                    <input type="number" id="user-input" step="any" placeholder="?">
                    <span id="unit-to">m</span>
                </div>
                <button id="check-btn" class="btn action">Prüfen</button>
            </div>

            <div id="feedback" class="feedback hidden"></div>
            <button id="next-btn" class="btn secondary hidden">Nächste Aufgabe</button>
        </section>

        <section id="deutsch" class="card hidden">
            <h2>Deutsch — Einstieg</h2>
            <p>Wähle aus, was du üben möchtest und starte die Übung.</p>
            <div class="control-group">
                <label for="deutsch-mode">Übung</label>
                <select id="deutsch-mode">
                    <option value="grammar">Grammatik</option>
                    <option value="reading">Lesen</option>
                    <option value="diktat">Schreiben: Diktat</option>
                    <option value="woerter-ordnen">Schreiben: Wörter ordnen</option>
                    <option value="artikel">Schreiben: Artikel (der/die/das)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="deutsch-difficulty">Schwierigkeit:</label>
                <select id="deutsch-difficulty">
                    <option value="easy">Einfach</option>
                    <option value="medium">Mittel</option>
                    <option value="hard">Schwer</option>
                </select>
            </div>
            <div class="control-group">
                <button id="deutsch-start" class="btn primary">Los geht's!</button>
            </div>
        </section>

        <section id="login" class="card hidden">
            <div id="login-content"></div>
        </section>

        <section id="stats" class="card hidden">
            <div id="stats-content"></div>
        </section>

        <section id="deutsch-area" class="card hidden">
            <div class="score-board">
                <span>Punkte: <span id="deutsch-score">0</span></span>
            </div>
            <div id="deutsch-content">
                <h3 id="deutsch-title">Deutsch — Übung</h3>
                <p id="deutsch-placeholder">Hier erscheinen später die Aufgaben (z. B. Grammatik-, Lese- oder Schreibaufgaben).</p>
            </div>
        </section>
    </div>
    <!-- Cache-busting: add ?v=timestamp to all local assets so the browser fetches fresh JS/CSS -->
    <script type="module">
        const v = Date.now();
        const css = document.querySelector('link[rel=stylesheet]');
        if (css) css.href = 'style.css?v=' + v;
        import('./main.js?v=' + v);
    </script>
</body>
</html>
